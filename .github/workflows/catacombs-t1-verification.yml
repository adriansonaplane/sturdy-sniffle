name: Catacombs T1 Verification
on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      releaseSeeds:
        description: Run release property suite
        type: boolean
        default: false
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build:workbench
      - run: npm run check:workbench
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:security
      - run: npm run test:property:pr
      - run: npm run test:regression
      - run: npm run test:coverage -- --coverageReporters=text-summary
      - run: npm run test:browser
      - run: npm run test:visual
      - run: npm run test:accessibility
      - run: npm run test:performance
      - run: npm audit --audit-level=high
      - run: git diff --check
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: t1-pr-artifacts, path: "artifacts/t1/**\ncoverage/coverage-summary.json\nplaywright-report/**\ntest-results/**", retention-days: 14, if-no-files-found: ignore }
  nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy: { fail-fast: false, matrix: { shard: [0,1,2,3] } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: T1_PROPERTY_SHARD=${{ matrix.shard }} T1_PROPERTY_SHARDS=4 npm run test:property:nightly
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: t1-nightly-shard-${{ matrix.shard }}, path: artifacts/t1/property/**, retention-days: 30, if-no-files-found: error }
  nightly-reconcile:
    needs: nightly
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with: { pattern: t1-nightly-shard-*, path: artifacts/t1/property, merge-multiple: true }
      - run: npm run test:property:reconcile -- --level nightly --shards 4 --dir artifacts/t1/property
      - run: npm run test:regression
      - run: npm run test:performance
      - run: npm run test:security
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: t1-nightly-summary, path: artifacts/t1/**, retention-days: 30, if-no-files-found: ignore }
  release:
    if: github.event_name == 'workflow_dispatch' && inputs.releaseSeeds == true
    runs-on: ubuntu-latest
    strategy: { fail-fast: false, matrix: { shard: [0,1,2,3,4,5,6,7] } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: T1_PROPERTY_SHARD=${{ matrix.shard }} T1_PROPERTY_SHARDS=8 npm run test:property:release
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: t1-release-shard-${{ matrix.shard }}, path: artifacts/t1/property/**, retention-days: 90, if-no-files-found: error }
  release-reconcile:
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.releaseSeeds == true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with: { pattern: t1-release-shard-*, path: artifacts/t1/property, merge-multiple: true }
      - run: npm run test:property:reconcile -- --level release --shards 8 --dir artifacts/t1/property
      - run: npm run test:regression
      - run: npm run test:performance
      - run: npm run test:coverage -- --coverageReporters=text --coverageReporters=json-summary
      - run: npm run test:browser
      - run: npm run test:visual
      - run: npm run test:accessibility
      - run: npm run test:security
      - run: npm run build
      - run: npm run build:workbench
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: t1-release-qualification-summary, path: "artifacts/t1/**\ncoverage/coverage-summary.json\nplaywright-report/**\ntest-results/**", retention-days: 90, if-no-files-found: ignore }
